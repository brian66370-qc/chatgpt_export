<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ChatGPT Export</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <div class="toolbar">
        <h1>ChatGPT Export</h1>
        <label class="language-picker" for="languageSelect">
          <span>Language</span>
          <select id="languageSelect" aria-label="Language">
            <option value="en" selected>English</option>
            <option value="zh-Hant">中文</option>
          </select>
        </label>
      </div>
      <p id="subtitle" class="subtitle">Export the current conversation to Markdown.</p>
      <button id="exportButton" type="button">Export .md</button>
      <p id="status" class="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
  </html>
